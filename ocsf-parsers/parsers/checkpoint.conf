{
  // Check Point pipe-delimited parser — OCSF v1.3.0
  attributes: {
    "metadata.version":             "1.3.0",
    "metadata.product.vendor_name": "Check Point",
    "metadata.product.name":        "Quantum Security Gateway",
    "metadata.log_provider":        "syslog",
    "Category":               "network",
    "dataSource.vendor":      "Check Point",
    "dataSource.name":        "Check Point",
    "dataSource.category":    "firewall",
    "category_uid":           4,
    "category_name":          "Network Activity",
    "class_uid":              4001,
    "class_name":             "Network Activity",
    "activity_id":            6,
    "type_uid":               400106,
    "status_id":              1,
    "severity_id":            1
  },

  patterns: {
    word: "[^|]+",
    num:  "\\d+",
    ip:   "\\d+\\.\\d+\\.\\d+\\.\\d+"
  },

  formats: [
    // Drop → Detection Finding
    {
      id: "cp_drop",
      attributes: {
        class_uid: 2004, class_name: "Detection Finding",
        category_uid: 2, category_name: "Findings",
        type_uid: 200401,
        finding_title: "Check Point Firewall Drop",
        severity_id: 3, severity: "Medium",
        disposition_id: 2, disposition: "Blocked"
      },
      format: "time=$ts=num$[|]action=Drop[|].*src=$src_ip=ip$[|]dst=$dst_ip=ip$[|]proto=$protocol=word$[|]s_port=$src_port=num$[|]service=$dst_port=num$.*",
      halt: true
    },

    // Reject → Detection Finding
    {
      id: "cp_reject",
      attributes: {
        class_uid: 2004, class_name: "Detection Finding",
        category_uid: 2, category_name: "Findings",
        type_uid: 200401,
        finding_title: "Check Point Firewall Reject",
        severity_id: 3, severity: "Medium",
        disposition_id: 2, disposition: "Blocked"
      },
      format: "time=$ts=num$[|]action=Reject[|].*src=$src_ip=ip$[|]dst=$dst_ip=ip$[|].*",
      halt: true
    },

    // Accept (allowed traffic)
    {
      id: "cp_accept",
      attributes: {
        class_uid: 4001, class_name: "Network Activity",
        type_uid: 400106,
        disposition_id: 1, disposition: "Allowed"
      },
      format: "time=$ts=num$[|]action=Accept[|].*src=$src_ip=ip$[|]dst=$dst_ip=ip$[|]proto=$protocol=word$[|]s_port=$src_port=num$[|]service=$dst_port=num$.*",
      halt: true
    }
  ]
}
